name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - .gcloudignore
      - poetry.lock
      - pyproject.toml
      - Procfile

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.GCP_CLOUD_RUN_SERVICE }} \
            --source . \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars \
                EMAIL_HOST=${{ vars.EMAIL_HOST }},\
                EMAIL_PORT=${{ vars.EMAIL_PORT }},\
                GCLOUD_STORAGE_BUCKET_NAME=${{ vars.GCP_STORAGE_BUCKET_NAME }},\
                GCLOUD_STORAGE_BUCKET_LOCATION=${{ vars.GCP_STORAGE_BUCKET_REGION }} \
            --set-secrets \
                EMAIL_USERNAME=EMAIL_USERNAME:latest,\
                EMAIL_PASSWORD=EMAIL_PASSWORD:latest
